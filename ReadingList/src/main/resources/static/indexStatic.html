<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>My Reading List</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="css/main.css">
	<script src="js/script.js"></script>
</head>

<body>

<div>
	This is my JavaScript/AJAX front end. <a href="index.html">View my Angular front end.</a>
	<hr>
</div>
	<main class="container">

		<h1>Reading List <button id="goToAddButton" class="btn btn-outline-success">Add a Book</button></h1>

		<div id="bookListDiv">
			<table class="table table-hover">
				<thead class="table-dark">
					<tr>
						<th>Cover</th>
						<th>Title</th>
						<th>Delete</th>
					</tr>
				</thead>
				<tbody id="bookTable"></tbody>
			</table>
		</div>

		<div id="bookDetailDiv"></div>

		<div id="addBookDiv">
			<form name="addBookAddAuthorForm" id="addBookAddAuthorForm">
			</form>
			<form name="addBookForm">
				<div class="row">
					<label class="form-label col-auto" for="title">Title</label>
					<input class="form-control col" name="title" type="text">
				</div>
				<div>
					<label class="form-label col-auto" for="author">Author</label>
					<select class="form-select col" name="author"></select>
					<button class="btn btn-outline-success col-auto" name="showAddAuthorButton">Add Author</button>
				</div>
				<div id="addAuthorAddDiv">
						<div class="row">
							<label class="form-label col-auto" for="fullName" form="addBookAddAuthorForm">Full Name</label>
							<input class="form-control col" name="fullName" type="text" form="addBookAddAuthorForm">
						</div>
						<div class="row">
							<label class="form-label col-auto" for="imageUrl" form="addBookAddAuthorForm">Image URL</label>
							<input class="form-control col" name="imageUrl" type="text" form="addBookAddAuthorForm">
						</div>

						<button class="btn btn-primary" name="cancelAddAuthor" form="addBookAddAuthorForm">Cancel</button>
						<button class="btn btn-primary" name="addAuthor" form="addBookAddAuthorForm">Save</button>
				</div>
				<div class="row">
					<label class="form-label col-auto" for="pages">Pages</label>
					<input class="form-control col" name="pages" type="number">
				</div>
				<div class="row">
					<label class="form-label col-auto" for="description">Description</label>
					<textarea class="form-control col" name="description"></textarea>
				</div>
				<div class="row">
					<label class="form-label col-auto" for="coverImageUrl">Cover Image URL</label>
					<input class="form-control col" name="coverImageUrl" type="text">
				</div>
				<div class="row">
					<label class="form-label col-auto" for="lastFinished">Date Last Finished</label>
					<input class="form-control col" name="lastFinished" type="date">
				</div>
				<button class="btn btn-primary" name="saveNewBook">Save</button>
				<button class="btn btn-danger" name="cancelAdd">Cancel</button>
			</form>

		</div>

		<div id="editBookDiv">
			<form name="editBookForm">
				<div class="row">
					<label class="form-label col-auto" for="title">Title</label>
					<input class="form-control col" name="title" type="text">
				</div>
				<div>
					<label class="form-label col-auto" for="author">Author</label>
					<select class="form-select col" name="author"></select>
					<button class="btn btn-outline-success col-auto" name="showAddAuthorButton">Add Author</button>
				</div>
				<div id="addAuthorEditDiv">
					//TODO
				</div>
				<div class="row">
					<label class="form-label col-auto" for="pages">Pages</label>
					<input class="form-control col" name="pages" type="number">
				</div>
				<div class="row">
					<label class="form-label col-auto" for="description">Description</label>
					<textarea class="form-control col" name="description"></textarea>
				</div>
				<div class="row">
					<label class="form-label col-auto" for="coverImageUrl">Cover Image URL</label>
					<input class="form-control col" name="coverImageUrl" type="text">
				</div>
				<div class="row">
					<label class="form-label col-auto" for="lastFinished">Date Last Finished</label>
					<input class="form-control col" name="lastFinished" type="date">
				</div>
				<input type="hidden" name="id">
				<button class="btn btn-primary" name="saveEditedBook">Save</button>
				<button class="btn btn-danger" name="cancelEdit">Cancel</button>
			</form>
		</div>


	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>

</html>
