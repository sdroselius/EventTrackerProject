<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spelunker</title>

<script type="text/javascript" src="js/script.js"></script>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

	<main class="container">

		<h1>Welcome to the Cave Log</h1>

		<div id="caveListDiv" class="container">
			<table class="table table-striped">
				<thead class="table-dark">
					<tr>
						<th>Name</th>
						<th>Last Updated</th>
						<th>Explored Length (km)</th>
					</tr>
				</thead>
				<tbody id="caveListBody">
				</tbody>
			</table>
			<div class="container">
		  <form name="caveForm">
		   <div class="row">
		    <input class="form-control col" type="number" name="caveId">
		    <button class="btn btn-info col-auto" name="lookup">Get Cave by Id</button>
		   </div>
		  </form>
			</div>
		</div>
		
		<div id="caveDetailsDiv">
	
		</div>
		
		<div id="addNewCaveDiv">
		</div>

	</main>


</body>
</html>
