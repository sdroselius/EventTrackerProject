<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spelunker</title>

<script type="text/javascript" src="js/script.js"></script>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

	<main class="container">

		<h1>Welcome to the Cave Log</h1>

		<div id="caveListDiv" class="container">
			<table class="table table-striped">
				<thead class="table-dark">
					<tr>
						<th>Name</th>
						<th>Last Updated</th>
						<th>Explored Length (km)</th>
					</tr>
				</thead>
				<tbody id="caveListBody">
				</tbody>
			</table>
			<div class="container">
			  <form name="caveForm">
			   <div class="row">
			    <input class="form-control col" type="number" name="caveId">
			    <button class="btn btn-info col-auto" name="lookup">Get Cave by Id</button>
			   </div>
			  </form>
			</div>
			<button id="showAddCaveButton" class="btn btn-outline-success">Add a New Cave</button>
		</div>
		
		<div id="caveDetailsDiv">
	
		</div>
		
		<div id="addNewCaveDiv">
		<form name="addNewCaveForm">
			<div class="row">
				<label for="name" class="form-label col-auto">Name</label>
				<input type="text" name="name" class="form-control col">
			</div>
			<div class="row">
				<label for="imageUrl" class="form-label col-auto">Image URL</label>
				<input type="text" name="imageUrl" class="form-control col">
			</div>
			<div class="row">
				<label for="description" class="form-label col-auto">Description</label>
				<textarea type="text" name="description" class="form-control col"></textarea>
			</div>
			<div class="row">
				<label for="primaryEntranceLatitude" class="form-label col-auto">Latitude</label>
				<input type="number" name="primaryEntranceLatitude" class="form-control col">
			</div>
			<div class="row">
				<label for="primaryEntranceLongitude" class="form-label col-auto">Longitude</label>
				<input type="number" name="primaryEntranceLongitude" class="form-control col">
			</div>
			<div class="row">
				<label for="formationType" class="form-label col-auto">Formation Type</label>
				<select name="formationType" class="form-select col"></select>
			</div>
			<button id="cancelAddCaveButton" class="btn btn-outline-danger">Cancel</button>
			<button name="addNewCaveButton" class="btn btn-outline-primary">Add Cave</button>
		</form>
		
		</div>

	</main>


</body>
</html>
